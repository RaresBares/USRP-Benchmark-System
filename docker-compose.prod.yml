services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5

  entrypoint:
    image: ghcr.io/YOURUSER/usrp-benchmark-entrypoint:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./data/tasks:/data
    depends_on:
      db:
        condition: service_healthy

  worker:
    image: ghcr.io/YOURUSER/usrp-benchmark-worker:latest
    restart: unless-stopped
    privileged: true
    env_file: .env
    volumes:
      - ./data/tasks:/data
      - /dev/bus/usb:/dev/bus/usb
    devices:
      - /dev/bus/usb
    depends_on:
      db:
        condition: service_healthy
